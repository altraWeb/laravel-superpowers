# laravel-livewire-superpowers per-project config overlay.
# Overrides config.defaults.yaml for this development repository.
#
# skills/**, docs/*.md, agents/**, commands/**, README.md are added to
# exception_paths because these are plugin-internal documentation files that
# legitimately reference terms like "Pilot 2.0", phase names, etc.
# Without this, the banned-token-leak-guard blocks commits to these files.
banned_tokens:
  exception_paths:
    - "docs/plans/**"
    - "docs/superpowers/**"
    - "skills/**"
    - "CHANGELOG.md"
    - "docs/*.md"
    - "agents/**"
    - "commands/**"
    - "README.md"
